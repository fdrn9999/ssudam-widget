<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="filter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a862"/>
      <stop offset="50%" stop-color="#dda15e"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="50%" stop-color="#ff6b00"/>
      <stop offset="100%" stop-color="#ffaa00"/>
    </linearGradient>
    <linearGradient id="ash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#999"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#333" stroke-width="4"/>
  <!-- Cigarette body - rotated 30 degrees -->
  <g transform="translate(256,256) rotate(-30) translate(-256,-256)">
    <!-- Ash tip -->
    <rect x="226" y="100" width="60" height="30" rx="15" fill="url(#ash)"/>
    <!-- Ember -->
    <rect x="226" y="128" width="60" height="12" fill="url(#ember)" filter="url(#glow)"/>
    <!-- Paper -->
    <rect x="226" y="138" width="60" height="180" fill="url(#paper)"/>
    <!-- Filter -->
    <rect x="226" y="316" width="60" height="80" rx="3" fill="url(#filter)"/>
    <!-- Filter lines -->
    <line x1="236" y1="316" x2="236" y2="396" stroke="rgba(255,140,0,0.2)" stroke-width="1"/>
    <line x1="246" y1="316" x2="246" y2="396" stroke="rgba(255,140,0,0.2)" stroke-width="1"/>
    <line x1="256" y1="316" x2="256" y2="396" stroke="rgba(255,140,0,0.2)" stroke-width="1"/>
    <line x1="266" y1="316" x2="266" y2="396" stroke="rgba(255,140,0,0.2)" stroke-width="1"/>
    <line x1="276" y1="316" x2="276" y2="396" stroke="rgba(255,140,0,0.2)" stroke-width="1"/>
  </g>
  <!-- Smoke wisps -->
  <g opacity="0.3" transform="translate(256,256) rotate(-30) translate(-256,-256)">
    <ellipse cx="250" cy="75" rx="15" ry="20" fill="#ccc" opacity="0.4"/>
    <ellipse cx="265" cy="50" rx="20" ry="15" fill="#ddd" opacity="0.3"/>
    <ellipse cx="245" cy="30" rx="12" ry="18" fill="#eee" opacity="0.2"/>
  </g>
</svg>
